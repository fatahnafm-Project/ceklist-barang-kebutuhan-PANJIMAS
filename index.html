<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gorda Inventory System v4.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #f1f5f9; font-family: 'Inter', sans-serif; }
        .checked-item { background-color: #ecfdf5; border-left: 4px solid #10b981; opacity: 0.8; }
        .unchecked-item { background-color: white; border-left: 4px solid #ef4444; }
        .tab-active { border-bottom: 3px solid #4f46e5; color: #4f46e5; font-weight: bold; }
    </style>
</head>
<body class="pb-20">

    <div class="bg-indigo-900 text-white p-6 shadow-xl sticky top-0 z-50">
        <div class="max-w-4xl mx-auto">
            <div class="flex justify-between items-center">
                <h1 class="text-xl font-bold uppercase tracking-widest"><i class="fas fa-boxes mr-2"></i> Inventory Gorda</h1>
                <div class="text-right">
                    <p id="statsText" class="text-[10px] font-mono uppercase opacity-80">0/0 Item</p>
                    <p id="percentText" class="text-lg font-bold text-emerald-400">0%</p>
                </div>
            </div>
            <div class="mt-2 bg-indigo-800 rounded-full h-2 overflow-hidden">
                <div id="progressBar" class="bg-emerald-400 h-full transition-all duration-500" style="width: 0%"></div>
            </div>
        </div>
    </div>

    <div class="max-w-4xl mx-auto p-4 mt-4">
        
        <div class="bg-white p-4 rounded-xl shadow-md mb-6 space-y-4">
            <div class="relative">
                <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-slate-400">
                    <i class="fas fa-search"></i>
                </span>
                <input type="text" id="searchInput" onkeyup="render()" 
                       placeholder="Cari barang di kategori ini..." 
                       class="w-full pl-10 pr-4 py-3 rounded-lg border border-slate-200 outline-none focus:ring-2 ring-indigo-500 text-sm">
            </div>

            <div class="flex overflow-x-auto pb-2 gap-4 text-xs uppercase tracking-wider text-slate-500 border-b" id="tabBar">
                <button onclick="switchTab('SEMUA')" id="tab-SEMUA" class="tab-active whitespace-nowrap pb-2">Semua</button>
                <button onclick="switchTab('MEBEL')" id="tab-MEBEL" class="whitespace-nowrap pb-2">Mebel & Ruang</button>
                <button onclick="switchTab('MAKAN')" id="tab-MAKAN" class="whitespace-nowrap pb-2">Alat Makan</button>
                <button onclick="switchTab('KONSUMSI')" id="tab-KONSUMSI" class="whitespace-nowrap pb-2">Konsumsi</button>
                <button onclick="switchTab('BERSIH')" id="tab-BERSIH" class="whitespace-nowrap pb-2">Kebersihan & Mandi</button>
                <button onclick="switchTab('LAIN')" id="tab-LAIN" class="whitespace-nowrap pb-2">Lainnya</button>
            </div>

            <div class="flex gap-2 pt-2">
                <button onclick="downloadJPG()" class="bg-blue-600 text-white px-3 py-2 rounded text-[10px] font-bold shadow hover:bg-blue-700">JPG</button>
                <button onclick="generatePDF()" class="bg-rose-600 text-white px-3 py-2 rounded text-[10px] font-bold shadow hover:bg-rose-700">PDF LAPORAN</button>
                <button onclick="resetData()" class="bg-slate-100 text-slate-500 px-3 py-2 rounded text-[10px] font-bold ml-auto">RESET</button>
            </div>
        </div>

        <div class="bg-white p-4 rounded-xl shadow-md mb-6 border-l-4 border-indigo-500">
            <div class="flex flex-wrap gap-2">
                <input type="text" id="newItemName" placeholder="Nama Barang..." class="flex-1 border-b p-2 text-sm outline-none">
                <input type="text" id="newItemQty" placeholder="Qty" class="w-16 border-b p-2 text-sm outline-none">
                <select id="newItemCat" class="border-b text-sm p-2 outline-none text-slate-500">
                    <option value="MEBEL">Mebel</option>
                    <option value="MAKAN">Alat Makan</option>
                    <option value="KONSUMSI">Konsumsi</option>
                    <option value="BERSIH">Kebersihan</option>
                    <option value="LAIN" selected>Lainnya</option>
                </select>
                <button onclick="addItem()" class="bg-indigo-600 text-white px-4 rounded-lg font-bold">+</button>
            </div>
        </div>

        <div id="main-list" class="space-y-3"></div>
    </div>

    <script>
        let currentTab = 'SEMUA';

        const initialData = [
            // MEBEL & RUANG
            { n: "Sofa Pimpinan Panjang (Qoah)", q: "-", c: "MEBEL" },
            { n: "Sofa Pimpinan Pendek (Qoah)", q: "-", c: "MEBEL" },
            { n: "Meja Pimpinan Panjang (Qoah)", q: "1", c: "MEBEL" },
            { n: "Meja Pimpinan Pendek (Qoah)", q: "1", c: "MEBEL" },
            { n: "Meja Pimpinan (Transit)", q: "3", c: "MEBEL" },
            { n: "Meja KMI", q: "11", c: "MEBEL" },
            { n: "Kursi Futura", q: "15", c: "MEBEL" },
            { n: "Kasur", q: "Fleksibel", c: "MEBEL" },
            { n: "Cermin Amen Gorda", q: "4", c: "MEBEL" },
            { n: "Taplak Meja Panjimas", q: "11", c: "MEBEL" },
            { n: "Gorden", q: "10", c: "MEBEL" },

            // ALAT MAKAN
            { n: "Piring Ceper Pimpinan", q: "3", c: "MAKAN" },
            { n: "Piring Makan Biasa Penguji", q: "25", c: "MAKAN" },
            { n: "Gelas Tangkai", q: "3", c: "MAKAN" },
            { n: "Tutup Gelas Tangkai", q: "3", c: "MAKAN" },
            { n: "Sendok Makan Besi", q: "25", c: "MAKAN" },
            { n: "Sendok Plastik Besar", q: "5 Slop", c: "MAKAN" },
            { n: "Sendok Plastik Kecil", q: "4 Pack", c: "MAKAN" },
            { n: "Mangkuk", q: "25", c: "MAKAN" },
            { n: "Tudung Saji", q: "3", c: "MAKAN" },
            { n: "Toples (Transit)", q: "10", c: "MAKAN" },
            { n: "Rodong Krupuk (Transit)", q: "1", c: "MAKAN" },

            // KONSUMSI
            { n: "Amidas Gelas 220 ml", q: "90 Dus", c: "KONSUMSI" },
            { n: "Amidas Botol 600 ml", q: "5 Dus", c: "KONSUMSI" },
            { n: "Amidas Galon", q: "15 Galon", c: "KONSUMSI" },
            { n: "Bal-Balan Pedes", q: "2 Bal", c: "KONSUMSI" },
            { n: "Bal-Balan Gurih", q: "8 Bal", c: "KONSUMSI" },
            { n: "Bal-Balan Manis", q: "3 Bal", c: "KONSUMSI" },
            { n: "Parcel Buah", q: "9 Parcel", c: "KONSUMSI" },
            { n: "Toam Toples Ust Suyuh", q: "6-8 Jenis", c: "KONSUMSI" },
            { n: "Minuman Saset Panitia", q: "Fleksibel", c: "KONSUMSI" },

            // KEBERSIHAN
            { n: "Pel Pelan", q: "4", c: "BERSIH" },
            { n: "Superpel", q: "2", c: "BERSIH" },
            { n: "Sikat WC", q: "5", c: "BERSIH" },
            { n: "Vixal", q: "5", c: "BERSIH" },
            { n: "Sabun Mandi Cair Besar", q: "5", c: "BERSIH" },
            { n: "Odol", q: "3", c: "BERSIH" },
            { n: "Sikat Gigi", q: "6", c: "BERSIH" },
            { n: "Handuk", q: "7", c: "BERSIH" },
            { n: "Tisu Kotak Kardus", q: "20", c: "BERSIH" },

            // LAINNYA
            { n: "Password Wifi Transit", q: "3", c: "LAIN" },
            { n: "Terminal Listrik", q: "Fleksibel", c: "LAIN" },
            { n: "Hanger", q: "30", c: "LAIN" },
            { n: "Pemanggang Roti", q: "2", c: "LAIN" },
            { n: "Asbak", q: "3", c: "LAIN" }
        ];

        let inventory = JSON.parse(localStorage.getItem('gorda_v4')) || initialData.map((d, i) => ({...d, id: Date.now() + i, done: false}));

        function save() {
            localStorage.setItem('gorda_v4', JSON.stringify(inventory));
            render();
        }

        function switchTab(cat) {
            currentTab = cat;
            document.querySelectorAll('#tabBar button').forEach(btn => btn.classList.remove('tab-active'));
            document.getElementById('tab-' + cat).classList.add('tab-active');
            render();
        }

        function render() {
            const list = document.getElementById('main-list');
            const searchQuery = document.getElementById('searchInput').value.toLowerCase();
            list.innerHTML = "";
            
            let doneCount = inventory.filter(i => i.done).length;
            
            // Filter Berdasarkan Tab & Search
            const filtered = inventory.filter(item => {
                const matchTab = (currentTab === 'SEMUA' || item.c === currentTab);
                const matchSearch = item.n.toLowerCase().includes(searchQuery);
                return matchTab && matchSearch;
            });

            filtered.forEach((item) => {
                const idx = inventory.findIndex(i => i.id === item.id);
                list.innerHTML += `
                    <div class="flex items-center p-4 rounded-lg shadow-sm transition-all ${item.done ? 'checked-item' : 'unchecked-item'}">
                        <input type="checkbox" ${item.done ? 'checked' : ''} onchange="toggle(${idx})" class="w-5 h-5 cursor-pointer accent-emerald-500">
                        <div class="flex-1 ml-4">
                            <h4 class="text-sm font-bold ${item.done ? 'text-emerald-700' : 'text-slate-800'}">${item.n}</h4>
                            <div class="flex gap-2 items-center">
                                <span class="text-[9px] bg-slate-100 px-2 py-0.5 rounded text-slate-500 font-bold">${item.c}</span>
                                <span class="text-[10px] text-slate-400 uppercase font-mono">Qty: ${item.q}</span>
                            </div>
                        </div>
                        <button onclick="remove(${idx})" class="text-slate-300 hover:text-red-500 p-2"><i class="fas fa-trash-alt"></i></button>
                    </div>
                `;
            });

            // Update Progress Bar
            const percent = inventory.length ? Math.round((doneCount / inventory.length) * 100) : 0;
            document.getElementById('progressBar').style.width = percent + '%';
            document.getElementById('statsText').innerText = `${doneCount}/${inventory.length} Item`;
            document.getElementById('percentText').innerText = percent + '%';
        }

        function toggle(idx) { inventory[idx].done = !inventory[idx].done; save(); }
        function remove(idx) { if(confirm('Hapus item?')) { inventory.splice(idx, 1); save(); } }
        
        function addItem() {
            const n = document.getElementById('newItemName').value;
            const q = document.getElementById('newItemQty').value || "1";
            const c = document.getElementById('newItemCat').value;
            if(!n) return alert("Nama barang kosong!");
            inventory.push({ id: Date.now(), n, q, c, done: false });
            document.getElementById('newItemName').value = "";
            save();
        }

        function resetData() {
            if(confirm("Reset semua data?")) {
                localStorage.clear();
                inventory = initialData.map((d, i) => ({...d, id: Date.now() + i, done: false}));
                save();
            }
        }

        function downloadJPG() {
            html2canvas(document.getElementById('main-list'), { scale: 2 }).then(canvas => {
                const a = document.createElement('a');
                a.download = `Checklist_Gorda_${currentTab}.jpg`;
                a.href = canvas.toDataURL('image/jpeg');
                a.click();
            });
        }

        function generatePDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            doc.text("LAPORAN INVENTORY GORDA", 105, 20, {align:"center"});
            let y = 30;
            doc.setFontSize(10);
            
            inventory.forEach(item => {
                if(y > 280) { doc.addPage(); y = 20; }
                const status = item.done ? "[V]" : "[ ]";
                doc.text(`${status} ${item.n} (${item.q}) - [${item.c}]`, 20, y);
                y += 7;
            });
            doc.save("Laporan_Gorda.pdf");
        }

        window.onload = render;
    </script>
</body>
</html>
