<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gorda Inventory System - Student Admission Committee</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { background-color: #f8fafc; font-family: 'Inter', sans-serif; }
        .checked-item { background-color: #f0fdf4; border-left: 4px solid #22c55e; opacity: 0.7; }
        .unchecked-item { background-color: white; border-left: 4px solid #ef4444; }
        .tab-active { background-color: #4338ca; color: white; }
    </style>
</head>
<body class="pb-20">

    <div class="bg-indigo-900 text-white p-5 shadow-2xl sticky top-0 z-50">
        <div class="max-w-4xl mx-auto text-center mb-4">
            <h2 class="text-sm tracking-widest uppercase font-bold">Student Admission Committee</h2>
            <h1 class="text-lg font-black uppercase">Inventory Gorda - ITTC Gontor</h1>
            <p class="text-[10px] opacity-60">Office: Pakistan Building Second Floor 201</p>
        </div>
        <div class="max-w-4xl mx-auto">
            <div class="flex justify-between items-center mb-2">
                <p id="statsText" class="text-[10px] font-mono uppercase">0/0 Item Terpenuhi</p>
                <span id="percentText" class="text-xl font-black text-emerald-400">0%</span>
            </div>
            <div class="w-full bg-indigo-950 rounded-full h-2">
                <div id="progressBar" class="bg-emerald-400 h-2 rounded-full transition-all duration-700" style="width: 0%"></div>
            </div>
        </div>
    </div>

    <div class="max-w-4xl mx-auto p-4 mt-2">
        <div class="bg-white p-4 rounded-2xl shadow-sm mb-6 space-y-4">
            <input type="text" id="searchInput" onkeyup="render()" placeholder="Cari barang atau nomor..." 
                   class="w-full px-4 py-3 bg-slate-50 rounded-xl outline-none border border-slate-100 text-sm">

            <div class="flex gap-2 overflow-x-auto pb-2" id="tabContainer">
                <button onclick="switchTab('SEMUA')" id="btn-SEMUA" class="tab-active px-4 py-2 rounded-lg text-[10px] font-bold uppercase whitespace-nowrap transition-all">Semua</button>
                <button onclick="switchTab('PERLENGKAPAN')" id="btn-PERLENGKAPAN" class="bg-slate-100 text-slate-500 px-4 py-2 rounded-lg text-[10px] font-bold uppercase whitespace-nowrap">Perlengkapan</button>
                <button onclick="switchTab('ADAWAT')" id="btn-ADAWAT" class="bg-slate-100 text-slate-500 px-4 py-2 rounded-lg text-[10px] font-bold uppercase whitespace-nowrap">Adawat</button>
                <button onclick="switchTab('KONSUMSI')" id="btn-KONSUMSI" class="bg-slate-100 text-slate-500 px-4 py-2 rounded-lg text-[10px] font-bold uppercase whitespace-nowrap">Konsumsi</button>
                <button onclick="switchTab('PERSONAL')" id="btn-PERSONAL" class="bg-slate-100 text-slate-500 px-4 py-2 rounded-lg text-[10px] font-bold uppercase whitespace-nowrap">Mandi & Personal</button>
                <button onclick="switchTab('KEBERSIHAN')" id="btn-KEBERSIHAN" class="bg-slate-100 text-slate-500 px-4 py-2 rounded-lg text-[10px] font-bold uppercase whitespace-nowrap">Kebersihan</button>
            </div>
        </div>

        <div class="flex gap-2 mb-6">
            <button onclick="downloadJPG()" class="flex-1 bg-indigo-600 text-white p-3 rounded-xl text-xs font-bold shadow-md">
                <i class="fas fa-image mr-2"></i> JPG
            </button>
            <button onclick="generatePDF()" class="flex-1 bg-rose-600 text-white p-3 rounded-xl text-xs font-bold shadow-md">
                <i class="fas fa-file-pdf mr-2"></i> PDF LAPORAN
            </button>
        </div>

        <div id="main-list" class="space-y-3"></div>
    </div>

    <script>
        let currentTab = 'SEMUA';
        
        const initialData = [
            // PERLENGKAPAN (MEBEL & RUANG) 
            { n: "Sofa Pimpinan Panjang (Qoah)", q: "1", c: "PERLENGKAPAN" },
            { n: "Sofa Pimpinan Pendek (Qoah)", q: "1", c: "PERLENGKAPAN" },
            { n: "Meja Pimpinan Panjang (Qoah)", q: "1", c: "PERLENGKAPAN" },
            { n: "Meja Pimpinan Pendek (Qoah)", q: "1", c: "PERLENGKAPAN" },
            { n: "Sofa (Muat 6 Orang) (Transit)", q: "Fleksibel", c: "PERLENGKAPAN" },
            { n: "Meja Pimpinan (Transit)", q: "3", c: "PERLENGKAPAN" },
            { n: "Meja (Direktur KMI, Wapeng, Wadir G2)", q: "5", c: "PERLENGKAPAN" },
            { n: "Kursi Futura (Direktur KMI, Wapeng, Wadir G2)", q: "5", c: "PERLENGKAPAN" },
            { n: "Meja KMI 11", q: "11", c: "PERLENGKAPAN" },
            { n: "Terminal Listrik (Transit/Kamar)", q: "Sebanyaknya", c: "PERLENGKAPAN" },
            { n: "Gorden (Transit & Kamar Panjimas)", q: "10", c: "PERLENGKAPAN" },
            { n: "Cermin Amen Gorda (Transit & Kamar)", q: "2", c: "PERLENGKAPAN" },
            { n: "Jemuran Baju Amen Gorda", q: "3", c: "PERLENGKAPAN" },
            { n: "Kasur", q: "Fleksibel", c: "PERLENGKAPAN" },

            // ADAWAT (ALAT MAKAN & PINJAMAN) 
            { n: "Kulkas", q: "1", c: "ADAWAT" },
            { n: "Piring Ceper (Pimpinan & Transit)", q: "6", c: "ADAWAT" },
            { n: "Gelas Tangkai & Tutup", q: "3 Set", c: "ADAWAT" },
            { n: "Piring Makan Biasa Penguji", q: "25", c: "ADAWAT" },
            { n: "Piring Biasa Toam Bal-balan Kls 6", q: "50", c: "ADAWAT" },
            { n: "Sendok Makan Besi", q: "25 (-20)", c: "ADAWAT" },
            { n: "Sendok Bebek", q: "25", c: "ADAWAT" },
            { n: "Mangkuk", q: "25", c: "ADAWAT" },
            { n: "Nampan", q: "2", c: "ADAWAT" },
            { n: "Dispenser (Minjem Gontor 2)", q: "2", c: "ADAWAT" },
            { n: "Tempat Gula & Kopi Kaca (Minjem)", q: "2", c: "ADAWAT" },
            { n: "Pisau Potong & Pisau Selai", q: "4", c: "ADAWAT" },
            { n: "Tudung Saji", q: "3", c: "ADAWAT" },
            { n: "Pemanggang Roti", q: "2", c: "ADAWAT" },

            // KONSUMSI (MAKANAN & MINUMAN) 
            { n: "Amidas Gelas 220 ml", q: "90 Dus", c: "KONSUMSI" },
            { n: "Amidas Botol 600 ml", q: "5 Dus", c: "KONSUMSI" },
            { n: "Amidas Galon (Panitia, Transit, Kls 6)", q: "15 Galon", c: "KONSUMSI" },
            { n: "Bal-Balan Pedes, Gurih, Manis", q: "13 Bal", c: "KONSUMSI" },
            { n: "Toam Toples Ust Suyuh (Khusus)", q: "6-8 Jenis", c: "KONSUMSI" },
            { n: "Parcel Buah", q: "9 Tiap Ujian", c: "KONSUMSI" },
            { n: "Snak DDC & Minuman Saset", q: "Fleksibel", c: "KONSUMSI" },
            { n: "Gelas Kertas & Plastik", q: "23 Slop", c: "KONSUMSI" },
            { n: "Sendok Plastik Besar & Kecil", q: "9 Pack", c: "KONSUMSI" },

            // PERSONAL (MANDI & GANTUNGAN) 
            { n: "Handuk (Transit & Panjimas)", q: "7", c: "PERSONAL" },
            { n: "Sabun Mandi Cair Besar", q: "5", c: "PERSONAL" },
            { n: "Sabun Muka & Cuci Tangan", q: "4", c: "PERSONAL" },
            { n: "Odol, Sikat Gigi, Listerin", q: "12", c: "PERSONAL" },
            { n: "Minyak Rambut & Parfum", q: "4 Jenis", c: "PERSONAL" },
            { n: "Sisir", q: "4", c: "PERSONAL" },
            { n: "Gantungan Baju & Hanger", q: "42", c: "PERSONAL" },
            { n: "Keset Hamam & Welcome", q: "8", c: "PERSONAL" },

            // KEBERSIHAN 
            { n: "Sapu Kamar & Sapu Lidi", q: "Fleksibel", c: "KEBERSIHAN" },
            { n: "Pel Pelan & Superpel", q: "6", c: "KEBERSIHAN" },
            { n: "Vixal & Sikat WC", q: "10", c: "KEBERSIHAN" },
            { n: "Tisu Kotak & Tisu Kecil Tepos", q: "70", c: "KEBERSIHAN" },
            { n: "Tisu Besar (Transit & Kamar)", q: "6", c: "KEBERSIHAN" },
            { n: "Kresek Sampah & Bontrot", q: "11 Pack", c: "KEBERSIHAN" },
            { n: "Pengharum Ruangan & WC", q: "5", c: "KEBERSIHAN" },
            { n: "Kapur Barus", q: "9", c: "KEBERSIHAN" },
            { n: "Rinso & Sikat Cuci", q: "4", c: "KEBERSIHAN" },
            { n: "Tempat Sampah (Transit & Kamar)", q: "11", c: "KEBERSIHAN" }
        ];

        let inventory = JSON.parse(localStorage.getItem('gorda_sac_v1')) || initialData.map((d, i) => ({...d, id: i + 1, done: false}));

        function save() {
            localStorage.setItem('gorda_sac_v1', JSON.stringify(inventory));
            render();
        }

        function switchTab(cat) {
            currentTab = cat;
            document.querySelectorAll('#tabContainer button').forEach(btn => btn.classList.remove('tab-active'));
            document.getElementById('btn-' + cat).classList.add('tab-active');
            render();
        }

        function render() {
            const list = document.getElementById('main-list');
            const search = document.getElementById('searchInput').value.toLowerCase();
            list.innerHTML = "";
            
            let doneCount = inventory.filter(i => i.done).length;
            
            const filtered = inventory.filter(item => {
                const matchTab = (currentTab === 'SEMUA' || item.c === currentTab);
                const matchSearch = item.n.toLowerCase().includes(search) || item.id.toString().includes(search);
                return matchTab && matchSearch;
            });

            filtered.forEach((item) => {
                list.innerHTML += `
                    <div class="flex items-center p-4 rounded-xl transition-all border ${item.done ? 'checked-item' : 'unchecked-item'}">
                        <span class="text-[10px] font-bold text-slate-400 mr-3 w-4">#${item.id}</span>
                        <input type="checkbox" ${item.done ? 'checked' : ''} onchange="toggle(${item.id})" class="w-5 h-5 cursor-pointer accent-indigo-600">
                        <div class="flex-1 ml-4">
                            <h4 class="text-sm font-bold ${item.done ? 'text-emerald-700' : 'text-slate-800'}">${item.n}</h4>
                            <p class="text-[10px] text-slate-400 uppercase font-mono">Qty: ${item.q} | ${item.c}</p>
                        </div>
                    </div>
                `;
            });

            const percent = Math.round((doneCount / inventory.length) * 100);
            document.getElementById('progressBar').style.width = percent + '%';
            document.getElementById('statsText').innerText = `${doneCount} / ${inventory.length} Item Terpenuhi`;
            document.getElementById('percentText').innerText = percent + '%';
        }

        function toggle(id) {
            const idx = inventory.findIndex(item => item.id === id);
            inventory[idx].done = !inventory[idx].done;
            save();
        }

        function downloadJPG() {
            const area = document.body;
            html2canvas(area, { scale: 2 }).then(canvas => {
                const a = document.createElement('a');
                a.download = 'Inventory_Gorda_SAC.jpg';
                a.href = canvas.toDataURL();
                a.click();
            });
        }

        function generatePDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            doc.setFontSize(14);
            doc.text("LAPORAN INVENTARIS GORDA - SAC", 105, 15, { align: "center" });
            
            let y = 25;
            doc.setFontSize(9);
            inventory.forEach(item => {
                if(y > 280) { doc.addPage(); y = 20; }
                const status = item.done ? "[V]" : "[ ]";
                doc.text(`${status} #${item.id} ${item.n} (${item.q})`, 20, y);
                y += 6;
            });
            doc.save("Laporan_Gorda_SAC.pdf");
        }

        window.onload = render;
    </script>
</body>
</html>
