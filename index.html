<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gorda Inventory System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #f1f5f9; font-family: 'Inter', sans-serif; }
        .checked-item { background-color: #ecfdf5; border-left: 4px solid #10b981; }
        .unchecked-item { background-color: white; border-left: 4px solid #ef4444; }
    </style>
</head>
<body class="pb-10">

    <div class="bg-indigo-900 text-white p-6 shadow-xl sticky top-0 z-50">
        <div class="max-w-4xl mx-auto">
            <h1 class="text-xl font-bold uppercase tracking-widest"><i class="fas fa-boxes mr-2"></i> Inventory Gorda</h1>
            <div class="mt-4 bg-indigo-800 rounded-full h-4 overflow-hidden border border-indigo-700">
                <div id="progressBar" class="bg-emerald-400 h-full transition-all duration-500" style="width: 0%"></div>
            </div>
            <p id="statsText" class="text-[10px] mt-1 font-mono uppercase opacity-80">0/0 Item Terpenuhi (0%)</p>
        </div>
    </div>

    <div class="max-w-4xl mx-auto p-4 mt-4">
        <div class="bg-white p-4 rounded-xl shadow-md mb-6 flex flex-wrap gap-2">
            <button onclick="downloadJPG()" class="bg-blue-600 text-white px-4 py-2 rounded shadow hover:bg-blue-700 text-xs font-bold">
                <i class="fas fa-image mr-1"></i> DOWNLOAD JPG
            </button>
            <button onclick="generatePDF()" class="bg-rose-600 text-white px-4 py-2 rounded shadow hover:bg-rose-700 text-xs font-bold">
                <i class="fas fa-file-pdf mr-1"></i> DOWNLOAD PDF LAPORAN
            </button>
            <button onclick="resetData()" class="bg-slate-200 text-slate-700 px-4 py-2 rounded shadow hover:bg-slate-300 text-xs font-bold ml-auto">
                RESET SEMUA
            </button>
        </div>

        <div class="bg-white p-4 rounded-xl shadow-md mb-6">
            <h3 class="text-xs font-bold mb-3 uppercase text-slate-500">Tambah Barang Baru</h3>
            <div class="flex gap-2">
                <input type="text" id="newItemName" placeholder="Nama Barang..." class="flex-1 border p-2 rounded text-sm outline-none focus:ring-2 ring-indigo-500">
                <input type="text" id="newItemQty" placeholder="Jumlah..." class="w-24 border p-2 rounded text-sm outline-none focus:ring-2 ring-indigo-500">
                <button onclick="addItem()" class="bg-indigo-600 text-white px-6 rounded font-bold hover:bg-indigo-700">+</button>
            </div>
        </div>

        <div id="report-area" class="bg-white p-6 rounded-none shadow-sm hidden">
             <h2 class="text-center font-bold text-xl underline mb-6">LAPORAN KESIAPAN BARANG GORDA</h2>
             <div id="print-list"></div>
        </div>

        <div id="main-list" class="space-y-3">
            </div>
    </div>

    <script>
        // Data Awal dari Input User & PDF
        const initialData = [
            { n: "Dispenser (Minjem Gontor 2) (Transit)", q: "1" },
            { n: "Dispenser (Minjem Gontor 2) (Kamar Panjimas)", q: "1" },
            { n: "Tempat Gula Kaca (Minjem Gorda)", q: "1" },
            { n: "Tempat Kopi Kaca (Minjem Gorda)", q: "1" },
            { n: "Alas Minuman Saset (Minjem Gorda)", q: "2" },
            { n: "Taplak Batik (Qoah)", q: "2" },
            { n: "Taplak Batik (Transit)", q: "3" },
            { n: "Tempat Kotak Tisu", q: "6" },
            { n: "Sendok Makan Besi", q: "25 (-20)" },
            { n: "Tudung Saji", q: "3" },
            { n: "Mangkuk", q: "25" },
            { n: "Sendok Bebek", q: "25" },
            { n: "Galon (Transit, Panjimas dan Kelas 6)", q: "16" },
            { n: "Kresek Sampah (Kamar Panjimas)", q: "4" },
            { n: "Kresek Sampah (Transit)", q: "2" },
            { n: "Kresek Bontrot (Transit)", q: "5 Pack" },
            { n: "Toples (Transit)", q: "10" },
            { n: "Toples Rodong (Kamar Panjimas)", q: "4" },
            { n: "Rodong Krupuk (Transit)", q: "1" },
            { n: "Gelas Kertas (Kamar Panjimas)", q: "8 Slop" },
            { n: "Gelas Kertas (Transit)", q: "5 Slop" },
            { n: "Gelas Plastik (Kamar Panjimas)", q: "5 Slop" },
            { n: "Sendok Plastik Besar", q: "5 Slop" },
            { n: "Pengharum Ruangan", q: "2" },
            { n: "Kapur Barus (Kamar Mandi Transit)", q: "6" },
            { n: "Handuk (Kamar Mandi Panjimas)", q: "5" },
            { n: "Amidas Botol 600 ml", q: "5 Dus" },
            { n: "Amidas Gelas 220 ml", q: "90 Dus" },
            { n: "Amidas Galon", q: "15 Galon" },
            { n: "Parcel Buah Sekali Ujian", q: "9 Parcel" },
            { n: "Ember Tempat Air (Kamar Mandi Panjimas)", q: "2" },
            { n: "Gayung (Kamar Mandi Panjimas)", q: "2" },
            { n: "Pemanggang Roti", q: "1" }
        ];

        let inventory = JSON.parse(localStorage.getItem('gorda_v2')) || initialData.map((d, i) => ({...d, id: Date.now() + i, done: false}));

        function save() {
            localStorage.setItem('gorda_v2', JSON.stringify(inventory));
            render();
        }

        function render() {
            const list = document.getElementById('main-list');
            list.innerHTML = "";
            let doneCount = 0;

            inventory.forEach((item, index) => {
                if(item.done) doneCount++;
                list.innerHTML += `
                    <div class="flex items-center p-4 rounded-lg shadow-sm transition-all ${item.done ? 'checked-item' : 'unchecked-item'}">
                        <input type="checkbox" ${item.done ? 'checked' : ''} onchange="toggle(${index})" class="w-5 h-5 cursor-pointer accent-emerald-500">
                        <div class="flex-1 ml-4">
                            <h4 class="text-sm font-bold ${item.done ? 'text-emerald-700' : 'text-slate-800'}">${item.n}</h4>
                            <p class="text-[10px] text-slate-500 uppercase font-mono">Qty: ${item.q}</p>
                        </div>
                        <button onclick="remove(${index})" class="text-slate-300 hover:text-red-500 p-2"><i class="fas fa-trash"></i></button>
                    </div>
                `;
            });

            const percent = inventory.length ? Math.round((doneCount / inventory.length) * 100) : 0;
            document.getElementById('progressBar').style.width = percent + '%';
            document.getElementById('statsText').innerText = `${doneCount}/${inventory.length} Item Terpenuhi (${percent}%)`;
        }

        function toggle(idx) { inventory[idx].done = !inventory[idx].done; save(); }
        function remove(idx) { if(confirm('Hapus barang ini?')) { inventory.splice(idx, 1); save(); } }
        
        function addItem() {
            const n = document.getElementById('newItemName').value;
            const q = document.getElementById('newItemQty').value || "-";
            if(!n) return alert("Nama barang wajib diisi!");
            inventory.push({ id: Date.now(), n, q, done: false });
            document.getElementById('newItemName').value = "";
            document.getElementById('newItemQty').value = "";
            save();
        }

        function resetData() {
            if(confirm("Kembalikan ke data awal?")) {
                localStorage.clear();
                inventory = initialData.map((d, i) => ({...d, id: Date.now() + i, done: false}));
                save();
            }
        }

        function downloadJPG() {
            const area = document.getElementById('main-list');
            html2canvas(area, { scale: 2 }).then(canvas => {
                const a = document.createElement('a');
                a.download = 'Checklist_Inventory_Gorda.jpg';
                a.href = canvas.toDataURL('image/jpeg', 0.9);
                a.click();
            });
        }

        async function generatePDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            
            doc.setFontSize(16);
            doc.text("LAPORAN STATUS INVENTORY GORDA", 105, 15, { align: "center" });
            
            let y = 30;
            doc.setFontSize(12);
            
            doc.setTextColor(255, 0, 0);
            doc.text("--- BARANG BELUM TERSEDIA (WARNING) ---", 20, y);
            y += 10;
            doc.setTextColor(0, 0, 0);
            doc.setFontSize(10);
            
            inventory.filter(i => !i.done).forEach(item => {
                if(y > 280) { doc.addPage(); y = 20; }
                doc.text(`[ ] ${item.n} (${item.q})`, 20, y);
                y += 7;
            });

            y += 10;
            doc.setFontSize(12);
            doc.setTextColor(0, 150, 0);
            doc.text("--- BARANG SUDAH SIAP ---", 20, y);
            y += 10;
            doc.setTextColor(100, 100, 100);
            doc.setFontSize(10);

            inventory.filter(i => i.done).forEach(item => {
                if(y > 280) { doc.addPage(); y = 20; }
                doc.text(`[V] ${item.n} (${item.q})`, 20, y);
                y += 7;
            });

            doc.save("Laporan_Inventory_Gorda.pdf");
        }

        render();
    </script>
</body>
</html>
