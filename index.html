        let inventory = JSON.parse(localStorage.getItem('gorda_121_items')) || rawData.map((d, i) => ({...d, id: i + 1, done: false}));

        function save() {
            localStorage.setItem('gorda_121_items', JSON.stringify(inventory));
            render();
        }

        function switchTab(cat) {
            currentTab = cat;
            document.querySelectorAll('#tabContainer button').forEach(btn => {
                btn.classList.remove('tab-active', 'bg-indigo-950', 'text-white');
                btn.classList.add('bg-slate-100', 'text-slate-500');
            });
            document.getElementById('btn-' + cat).classList.add('tab-active');
            render();
        }

        function render() {
            const list = document.getElementById('main-list');
            const search = document.getElementById('searchInput').value.toLowerCase();
            list.innerHTML = "";
            
            let doneCount = inventory.filter(i => i.done).length;
            const filtered = inventory.filter(item => {
                const matchTab = (currentTab === 'SEMUA' || item.c === currentTab);
                const matchSearch = item.n.toLowerCase().includes(search) || item.id.toString() === search;
                return matchTab && matchSearch;
            });

            filtered.forEach((item) => {
                const globalIdx = inventory.findIndex(i => i.id === item.id);
                list.innerHTML += `
                    <div class="flex items-center p-4 rounded-xl shadow-sm transition-all border ${item.done ? 'checked-item' : 'unchecked-item'}">
                        <span class="text-[10px] font-bold text-slate-400 mr-3 w-6">#${item.id}</span>
                        <input type="checkbox" ${item.done ? 'checked' : ''} onchange="toggle(${globalIdx})" 
                               class="w-6 h-6 cursor-pointer accent-emerald-500 rounded-md">
                        <div class="flex-1 ml-4" onclick="toggle(${globalIdx})">
                            <h4 class="text-sm font-semibold ${item.done ? 'text-emerald-800 line-through' : 'text-slate-800'}">${item.n}</h4>
                            <div class="flex items-center gap-2 mt-1">
                                <span class="text-[9px] bg-slate-100 text-slate-500 px-2 py-0.5 rounded font-bold uppercase">${item.c}</span>
                                <span class="text-[10px] text-indigo-600 font-mono font-bold">QTY: ${item.q}</span>
                            </div>
                        </div>
                    </div>
                `;
            });

            const percent = Math.round((doneCount / inventory.length) * 100);
            document.getElementById('progressBar').style.width = percent + '%';
            document.getElementById('statsText').innerText = `${doneCount} DARI ${inventory.length} ITEM SELESAI`;
            document.getElementById('percentText').innerText = percent + '%';
        }

        function toggle(idx) { inventory[idx].done = !inventory[idx].done; save(); }

        function downloadJPG() {
            html2canvas(document.body).then(canvas => {
                const link = document.createElement('a');
                link.download = 'Inventaris_Gorda_121_Items.jpg';
                link.href = canvas.toDataURL();
                link.click();
            });
        }

        function generatePDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            doc.setFontSize(16);
            doc.text("LAPORAN INVENTARIS GORDA (121 ITEM)", 105, 15, { align: "center" });
            doc.setFontSize(10);
            let y = 25;
            inventory.forEach(item => {
                if(y > 280) { doc.addPage(); y = 20; }
                const status = item.done ? "[V] " : "[ ] ";
                doc.text(`${status} #${item.id} ${item.n} - ${item.q}`, 15, y);
                y += 6;
            });
            doc.save("Laporan_Gorda_SAC.pdf");
        }

        window.onload = render;
